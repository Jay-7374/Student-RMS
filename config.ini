# Student Database Client — Configuration File
# =============================================
#
# This file is read automatically at client startup.
# Location: same directory as client.exe
#
# Format rules:
#   - Lines starting with '#' are comments and are ignored.
#   - Blank lines are ignored.
#   - Whitespace around '=' is trimmed automatically.
#   - Inline comments (# after value) are stripped.
#   - The last value for a key wins (useful for overrides).
#
# ─────────────────────────────────────────────
# SERVER_HOST
#   The hostname or IP address of the server.
#
#   Options:
#     a) DuckDNS hostname  →  yourname.duckdns.org
#     b) No-IP hostname    →  yourname.ddns.net
#     c) Local IP          →  192.168.1.100
#     d) Loopback          →  127.0.0.1
#
#   The client resolves this to an IP using getaddrinfo() at runtime —
#   you NEVER need to edit an IP address here.
# ─────────────────────────────────────────────
SERVER_HOST=127.0.0.1

# ─────────────────────────────────────────────
# SERVER_PORT
#   TCP port the server is listening on.
#   Must match the port passed to server.exe (default: 8080).
#   Valid range: 1–65535
# ─────────────────────────────────────────────
SERVER_PORT=8080
